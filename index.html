<!doctype HTML>
<html>
    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <meta charset="utf-8">
        <title>AR Ракета</title>
        <!-- A-Frame -->
        <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
        <!-- AR.js для маркеров (стабильная версия) -->
        <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.7/aframe/build/aframe-ar.min.js"></script>
    </head>
    <body style='margin:0; overflow:hidden;'>
        <a-scene embedded arjs="patternRatio: 0.75; debugUIEnabled: false;">
            <a-assets>
                <a-asset-item id="myModel" src="https://macsim200426.github.io/pol/vos.glb"></a-asset-item>
            </a-assets>

            <a-marker type="pattern" url="https://macsim200426.github.io/pater/pattern-KY-wrMBzzFE.patt">
                <a-entity
                    gltf-model="#myModel"
                    scale="0.5 0.5 0.5"
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
